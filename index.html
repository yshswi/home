<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yashaswi Sharma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:  #EED9B9;
  --c1:  #740A03;
  --c2:  #C3110C;
  --c3:  #E6501B;
  --ink:  #1A0F0A;
  --ink2: rgba(26,15,10,0.45);
  --ink3: rgba(26,15,10,0.22);
}

html, body {
  width:100%; height:100%;
  overflow-x:hidden;
  overflow-y:auto;
  background: var(--bg);
  font-family:'Outfit', sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── Background ─────────────────────────── */
.bg {
  position:fixed; inset:0; z-index:0;
  background: var(--bg);
  overflow:hidden;
}
.orb {
  position:absolute; border-radius:50%;
  filter: blur(100px); will-change:transform; pointer-events:none;
  /* NO CSS transition — JS drives position directly each frame */
}
.orb-1 {
  width:75vmax; height:75vmax;
  background: radial-gradient(circle, rgba(116,10,3,0.72) 0%, rgba(116,10,3,0.28) 45%, transparent 70%);
  top:-28%; left:-22%;
}
.orb-2 {
  width:60vmax; height:60vmax;
  background: radial-gradient(circle, rgba(195,17,12,0.60) 0%, rgba(195,17,12,0.20) 45%, transparent 70%);
  bottom:-20%; right:-14%;
}
.orb-3 {
  width:48vmax; height:48vmax;
  background: radial-gradient(circle, rgba(230,80,27,0.45) 0%, rgba(230,80,27,0.12) 50%, transparent 70%);
  top:25%; left:38%;
}
.bg::after {
  content:''; position:absolute; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.045; pointer-events:none; mix-blend-mode:multiply;
}

/* Cursor-tracking orb */
.orb-cursor {
  width: 44vmax; height: 44vmax;
  background: radial-gradient(circle, rgba(230,80,27,0.52) 0%, rgba(195,17,12,0.20) 45%, transparent 70%);
  top: 50%; left: 50%;
  margin-top: -22vmax; margin-left: -22vmax;
}

/* ── Layout ─────────────────────────────── */
.page {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 7vw;
}

.content-anchor {
  width:100%; max-width:900px;
  display:flex; flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  gap: 36px;
  margin-top: 0;
  transform: none;
}

.hero { width:100%; padding-bottom:0; text-align:left; flex-shrink:0; }
.glass { flex-shrink:0; width:100%; }

/* ── Hero ───────────────────────────────── */

.hero-name {
  display:block;
  font-family:'Instrument Serif', serif;
  font-weight:400;
  font-size: clamp(4.5rem, 10vw, 9rem);
  line-height:1.0;
  letter-spacing:-0.04em;
  color: #FFFFFF;
  animation: up .85s cubic-bezier(0.16,1,0.3,1) both;
}

/* ── Tagline (email under name) ─────────── */
.tagline-corner {
  display: block;
  margin-top: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: clamp(0.85rem, 1.4vw, 1.1rem);
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--c1);
  animation: up .85s .1s cubic-bezier(0.16,1,0.3,1) both;
  text-align: left;
}

@keyframes up {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Glass card ─────────────────────────── */
.glass {
  width:100%; max-width:900px;
  position:relative; overflow:hidden;
  background: rgba(255,255,255,0.46);
  backdrop-filter: blur(52px) saturate(160%);
  -webkit-backdrop-filter: blur(52px) saturate(160%);
  border-radius:20px;
  border: 1px solid rgba(255,255,255,0.70);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.88),
    0 2px 8px rgba(116,10,3,0.07),
    0 8px 32px rgba(116,10,3,0.09);
  padding:28px 32px 26px;
  animation: up .85s .16s cubic-bezier(0.16,1,0.3,1) both;
  transition:
    transform .5s cubic-bezier(0.34,1.4,0.64,1),
    box-shadow .4s ease,
    background .4s ease;
}

.glass:hover {
  transform: translateY(-3px) scale(1.005);
  background: rgba(255,255,255,0.56);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.95),
    0 6px 24px rgba(116,10,3,0.10),
    0 20px 56px rgba(116,10,3,0.13);
}

/* ── Running light on top border ────────── */
/*
  Technique: the card's top border is covered by a
  pseudo-element that is the same height as the border (1px),
  positioned absolutely, with a moving gradient acting as
  a glowing bead of light travelling left→right on a loop.
*/
.glass::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:1px;
  z-index:2;
  background: linear-gradient(
    90deg,
    transparent 0%,
    transparent var(--p, -40%),
    rgba(255,255,255,0.0)  calc(var(--p, -40%) + 0%),
    rgba(255,255,255,0.5)  calc(var(--p, -40%) + 8%),
    rgba(255,255,255,0.9)  calc(var(--p, -40%) + 15%),
    rgba(255,255,255,1.0)  calc(var(--p, -40%) + 20%),
    rgba(255,255,255,0.9)  calc(var(--p, -40%) + 25%),
    rgba(255,255,255,0.5)  calc(var(--p, -40%) + 32%),
    rgba(255,255,255,0.0)  calc(var(--p, -40%) + 40%),
    transparent            calc(var(--p, -40%) + 40%),
    transparent 100%
  );
  pointer-events:none;
  /* --p is animated by JS via requestAnimationFrame */
}

/* ── Panel ──────────────────────────────── */
.panel {
  display:grid;
  grid-template-columns: 1fr auto;
  gap:0 32px;
  align-items:start;
}

/* ── Card tagline ───────────────────────── */
.card-tagline {
  font-family:'Instrument Serif', serif;
  font-size: clamp(1.6rem, 3vw, 2.6rem);
  font-weight:400;
  letter-spacing:0.01em;
  color: var(--c1);
  line-height:1;
}

/* ── Social icons ───────────────────────── */
.socials {
  width: calc(100% - 32px);
  max-width: calc(900px - 32px);
  margin-left: 32px;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: flex-start;
  gap: 32px;
  flex: 0 0 auto;
  animation: up .85s .25s cubic-bezier(0.16,1,0.3,1) both;
}

.social-link {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  transition: color 0.2s ease, transform 0.2s ease;
}
.social-link:hover {
  color: #ffffff;
  transform: translateY(-2px);
}
.social-link svg {
  width: 18px;
  height: 18px;
}

/* ── Nav ────────────────────────────────── */
.nav-col {
  display:flex; flex-direction:column;
  align-items:flex-end; gap:8px;
  padding-top:6px;
}
.nav-item {
  font-size:0.62rem; font-weight:400;
  letter-spacing:0.14em; text-transform:uppercase;
  color: var(--ink3); text-decoration:none;
  cursor:default; user-select:none; transition:color .15s;
}
.nav-item.active { color: var(--ink2); }
.nav-item.soon { display:flex; align-items:center; gap:5px; }
.soon-pill {
  font-size:0.46rem; letter-spacing:0.1em;
  background:rgba(116,10,3,0.08); color:var(--c1);
  padding:1px 5px; border-radius:3px;
  border:1px solid rgba(116,10,3,0.15);
}

/* ── Divider ────────────────────────────── */
.divider {
  grid-column:1/-1; height:1px;
  background:rgba(26,15,10,0.07);
  margin:20px 0;
}

/* ── Brands ─────────────────────────────── */
.brands-wrap { grid-column:1/-1; display:flex; flex-direction:column; gap:9px; }
.brands-label {
  font-size:0.56rem; font-weight:500;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--ink2);
}
.brands-list {
  display:flex; flex-direction:row;
  align-items:center; flex-wrap:nowrap;
  justify-content:flex-start;
}

/* Each brand is a self-contained inline-flex unit */
.brand-item {
  display: inline-flex;
  align-items: center;
  cursor: default;
}

.brand-name {
  font-size:0.8rem; font-weight:400;
  color:var(--ink2);
  transition: color 0.25s ease;
  white-space: nowrap;
}
.brand-item:hover .brand-name {
  color: var(--ink);
}

/* Year slides in from the right, clipped */
.brand-year {
  display: inline-block;
  font-size: 0.8rem; font-weight: 300;
  color: var(--ink2);
  white-space: nowrap;
  overflow: hidden;
  max-width: 0;
  opacity: 0;
  transition:
    max-width 0.32s cubic-bezier(0.4, 0, 0.2, 1),
    opacity 0.25s ease,
    margin-left 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  margin-left: 0;
}


.sep {
  font-size:0.7rem; color:var(--ink3);
  margin:0 10px; user-select:none;
  flex-shrink: 0;
}





@media (hover: hover) and (pointer: fine) {
  .brand-item:hover .brand-year {
    max-width: 120px;
    opacity: 1;
    margin-left: 0;
  }
}

@media (hover: none), (pointer: coarse) {
  .brand-item.active .brand-year {
    max-width: 120px;
    opacity: 1;
    margin-left: 0;
  }
}

@media (max-width: 820px) {
  .socials {
    width: calc(100% - 20px);
    max-width: calc(100% - 20px);
    margin-left: 20px;
  }

  .page {
    position: relative;
    min-height: 100svh;
    justify-content: center;
    padding: 28px 20px;
  }

  .content-anchor {
    max-width: 100%;
    gap: 36px;
  }

  .glass {
    padding: 22px 20px 20px;
    border-radius: 18px;
  }

  .panel {
    grid-template-columns: 1fr;
    gap: 0;
  }

  .nav-col {
    display: none;
  }

  .divider {
    margin: 16px 0;
  }

  .brands-list {
    display: flex;
    flex-direction: row;
    align-items: center;
    flex-wrap: nowrap;
    justify-content: flex-start;
  }

  .brand-item {
    display: inline-flex;
    align-items: center;
    position: relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .sep {
    display: inline;
  }

  .socials {
    gap: 24px;
  }
}


@media (max-width: 560px) {
  .brands-list {
    flex-wrap: wrap;
    row-gap: 10px;
  }
}

@media (max-width: 430px) {
  .hero-name {
    font-size: clamp(3.5rem, 17vw, 5.2rem);
    line-height: 0.96;
  }

  .card-tagline {
    font-size: clamp(1.9rem, 7vw, 2.3rem);
  }

  .brands-list {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .brand-item {
    display: flex;
    align-items: baseline;
    flex-wrap: nowrap;
    gap: 0;
  }

  .brand-year {
    max-width: 0;
    opacity: 0;
    margin-left: 0;
  }

  .sep {
    display: none;
  }

  .brand-name,
  .brand-year {
    font-size: 0.9rem;
  }
}


</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1" id="o1"></div>
  <div class="orb orb-2" id="o2"></div>
  <div class="orb orb-3" id="o3"></div>
  <div class="orb orb-cursor" id="oc"></div>
</div>

<div class="page">
  <div class="content-anchor">

  <div class="hero">
    <span class="hero-name" id="gname">Yashaswi Sharma</span>
  </div>

  <div class="glass" id="card">
    <div class="panel">

      <span class="card-tagline">I like to think.</span>

      <div class="nav-col">
        <span class="nav-item active">Home</span>
        <span class="nav-item soon">Blog <span class="soon-pill">Soon</span></span>
      </div>

      <div class="divider"></div>

      <div class="brands-wrap">
        <div class="brands-list">
          <span class="brand-item">
            <span class="brand-name">Bain &amp; Company</span><span class="brand-year">: 2024–Now</span>
          </span>
          <span class="sep">•</span>
          <span class="brand-item">
            <span class="brand-name">IIM Ahmedabad</span><span class="brand-year">: 2022–24</span>
          </span>
          <span class="sep">•</span>
          <span class="brand-item">
            <span class="brand-name">Dalberg</span><span class="brand-year">: 2020–22</span>
          </span>
          <span class="sep">•</span>
          <span class="brand-item">
            <span class="brand-name">SRCC</span><span class="brand-year">: 2017–20</span>
          </span>
        </div>
      </div>

    </div>
  </div>

  <!-- Social icons -->
  <div class="socials">
    <a class="social-link" href="mailto:hi@yashaswis.com" title="Email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
    </a>
    <a class="social-link" href="https://in.linkedin.com/in/yashaswisharma" target="_blank" title="LinkedIn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
    </a>
    <a class="social-link" href="https://x.com/yshswi" target="_blank" title="X / Twitter">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </a>
    <a class="social-link" href="https://instagram.com/yshswi" target="_blank" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
    </a>
  </div>

  </div> <!-- /content-anchor -->

</div>

<script>
const o1=document.getElementById('o1'),
      o2=document.getElementById('o2'),
      o3=document.getElementById('o3'),
      oc=document.getElementById('oc');
let mx=0,my=0,smx=0,smy=0,t=0;
let ocx=innerWidth/2, ocy=innerHeight/2;
let tocx=innerWidth/2, tocy=innerHeight/2;

document.addEventListener('mousemove',e=>{
  mx=e.clientX/innerWidth-.5;
  my=e.clientY/innerHeight-.5;
  tocx=e.clientX; tocy=e.clientY;
});
function lerp(a,b,f){return a+(b-a)*f;}

const card=document.getElementById('card');
let borderP=-40;

(function tick(){
  t+=0.006;
  smx=lerp(smx,mx,0.06); smy=lerp(smy,my,0.06);

  const a1x=Math.sin(t*.6)*90+Math.cos(t*.35)*40, a1y=Math.cos(t*.5)*70+Math.sin(t*.28)*30;
  const a2x=Math.sin(t*.45+2)*75+Math.cos(t*.6)*35, a2y=Math.cos(t*.55+1)*60+Math.sin(t*.4)*25;
  const a3x=Math.sin(t*1.0+1)*55+Math.cos(t*.7)*22, a3y=Math.cos(t*.85+3)*44+Math.sin(t*.55)*18;

  o1.style.transform=`translate(${a1x}px,${a1y}px)`;
  o2.style.transform=`translate(${a2x}px,${a2y}px)`;
  o3.style.transform=`translate(${a3x}px,${a3y}px)`;

  ocx=lerp(ocx,tocx,.05); ocy=lerp(ocy,tocy,.05);
  oc.style.transform=`translate(${ocx-innerWidth/2}px,${ocy-innerHeight/2}px)`;

  borderP+=0.056;
  if(borderP>118) borderP=-40;
  card.style.setProperty('--p',borderP+'%');

  requestAnimationFrame(tick);
})();

const brandItems = Array.from(document.querySelectorAll('.brand-item'));
function isTapRevealView() {
  return window.matchMedia('(max-width: 430px)').matches &&
         window.matchMedia('(hover: none), (pointer: coarse)').matches;
}
brandItems.forEach(item => {
  item.addEventListener('click', () => {
    if (!isTapRevealView()) return;
    const isActive = item.classList.contains('active');
    brandItems.forEach(el => el.classList.remove('active'));
    if (!isActive) item.classList.add('active');
  });
});
window.addEventListener('resize', () => {
  if (!isTapRevealView()) {
    brandItems.forEach(el => el.classList.remove('active'));
  }
});

</script>
</body>
</html>
